<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>調堂系統 v1</title>
  
  <!-- 載入 React 與 Tailwind CSS 引擎 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 讓畫面填滿 Google Sites 的區塊 */
    body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  
  <!-- 系統會渲染在這個區塊 -->
  <div id="root"></div>

  <!-- React 應用程式原始碼 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // === 1. 系統設定 (已為你帶入專屬 API 網址) ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbz-r3TuJSyiQ8LV_VIjX64oNpSYrJbva72lvUNeK4V2uQ-I1-4KI8W1dDyCY2gjpmNQ/exec';
    const SETTINGS_PASSWORD = '535800'; // 設定頁面密碼

    // === 2. 內建 SVG 圖示 ===
    const Icons = {
      ChevronLeft: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>,
      ChevronRight: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m9 18 6-6-6-6"/></svg>,
      Calendar: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
      Settings: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Home: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Plus: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>,
      X: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>,
      GripVertical: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>,
      Trash2: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      CloudSync: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg>,
      Lock: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      AlertTriangle: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
    };

    // 預設資料
    const initialSlots = [
      { id: 's1', name: '課前一', time: '07:30-07:45', isOpen: true, days: [1,2,3,4,5] },
      { id: 's4', name: '第一節', time: '08:25-08:55', isOpen: true, days: [1,2,3,4,5] },
      { id: 's18', name: '樂Kids MI', time: '13:55-15:00', isOpen: true, days: [5] }
    ];
    const pastelColors = ['bg-red-100 border-red-200 text-red-800', 'bg-blue-100 border-blue-200 text-blue-800', 'bg-green-100 border-green-200 text-green-800', 'bg-yellow-100 border-yellow-200 text-yellow-800', 'bg-purple-100 border-purple-200 text-purple-800', 'bg-pink-100 border-pink-200 text-pink-800'];

    // === 主程式元件 ===
    function App() {
      const [isAppLoading, setIsAppLoading] = useState(true);
      const [isSyncing, setIsSyncing] = useState(false);

      const [currentDate, setCurrentDate] = useState(new Date());
      const [viewMode, setViewMode] = useState('week'); 
      const [activeTab, setActiveTab] = useState('calendar'); 
      
      const [teachers, setTeachers] = useState([{ id: 1, name: '陳大文', shortName: '陳' }]);
      const [classes, setClasses] = useState(['1A', '2A', '空堂']);
      const [slots, setSlots] = useState(initialSlots);
      const [records, setRecords] = useState([]);

      const [settingTab, setSettingTab] = useState('slots'); 
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherShort, setNewTeacherShort] = useState('');
      const [newClass, setNewClass] = useState('');
      const [draggedIdx, setDraggedIdx] = useState(null); 
      const [cleanupDate, setCleanupDate] = useState('');

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingRecord, setEditingRecord] = useState(null);
      const [selectedSlotInfo, setSelectedSlotInfo] = useState(null);

      // 密碼與驗證狀態
      const [isSettingsUnlocked, setIsSettingsUnlocked] = useState(false);
      const [showPwdModal, setShowPwdModal] = useState(false);
      const [pwdInput, setPwdInput] = useState('');
      const [pwdError, setPwdError] = useState('');

      // --- 載入與同步資料邏輯 ---
      useEffect(() => {
        if (!API_URL) {
          setIsAppLoading(false);
          return;
        }
        
        fetch(API_URL + "?action=getData")
          .then(res => res.json())
          .then(res => {
            if (res.status === 'success') {
              if (res.data.records?.length > 0) setRecords(res.data.records);
              if (res.data.slots?.length > 0) setSlots(res.data.slots);
              if (res.data.teachers?.length > 0) setTeachers(res.data.teachers);
              if (res.data.classes?.length > 0) setClasses(res.data.classes);
            }
          })
          .catch(err => console.error("資料載入失敗", err))
          .finally(() => setIsAppLoading(false));
      }, []);

      const syncToCloud = async (type, dataToSync) => {
        if (!API_URL) return;
        setIsSyncing(true);
        try {
          await fetch(API_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ type, data: dataToSync })
          });
        } catch (e) {
          console.error("同步失敗", e);
          alert("⚠️ 同步至雲端失敗，請檢查網路連線或稍後再試。");
        }
        setIsSyncing(false);
      };

      // --- 初始化與事件監聽 ---
      useEffect(() => {
        const handleResize = () => {
          if (window.innerWidth < 768) setViewMode('day');
          else setViewMode('week');
        };
        handleResize(); 
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // --- 日曆運算邏輯 ---
      const getStartOfWeek = (date) => {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
      };

      const currentWeekDays = useMemo(() => {
        const start = getStartOfWeek(currentDate);
        return Array.from({ length: 5 }).map((_, i) => { 
          const d = new Date(start);
          d.setDate(start.getDate() + i);
          return d;
        });
      }, [currentDate]);

      const displayedDays = viewMode === 'week' ? currentWeekDays : [currentDate];
      
      const formatDateStr = (date) => {
        const d = new Date(date);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const prevDate = () => {
        const newDate = new Date(currentDate);
        newDate.setDate(currentDate.getDate() - (viewMode === 'week' ? 7 : 1));
        if (viewMode === 'day' && newDate.getDay() === 0) newDate.setDate(newDate.getDate() - 2);
        if (viewMode === 'day' && newDate.getDay() === 6) newDate.setDate(newDate.getDate() - 1);
        setCurrentDate(newDate);
      };

      const nextDate = () => {
        const newDate = new Date(currentDate);
        newDate.setDate(currentDate.getDate() + (viewMode === 'week' ? 7 : 1));
        if (viewMode === 'day' && newDate.getDay() === 6) newDate.setDate(newDate.getDate() + 2);
        if (viewMode === 'day' && newDate.getDay() === 0) newDate.setDate(newDate.getDate() + 1);
        setCurrentDate(newDate);
      };

      const goToToday = () => setCurrentDate(new Date());

      // --- 記錄操作 ---
      const openAddModal = (date, slotId) => {
        setSelectedSlotInfo({ date: formatDateStr(date), slotId });
        setEditingRecord(null);
        setIsModalOpen(true);
      };

      const openEditModal = (record) => {
        setEditingRecord(record);
        setIsModalOpen(true);
      };

      const saveRecord = (formData) => {
        let newRecords;
        if (editingRecord) {
          newRecords = records.map(r => r.id === editingRecord.id ? { ...r, ...formData } : r);
        } else {
          const newRecord = {
            ...formData,
            id: `r_${Date.now()}`,
            date: selectedSlotInfo.date,
            slotId: selectedSlotInfo.slotId,
            color: pastelColors[Math.floor(Math.random() * pastelColors.length)]
          };
          newRecords = [...records, newRecord];
        }
        setRecords(newRecords);
        syncToCloud('records', newRecords);
        setIsModalOpen(false);
      };

      const deleteRecord = (id) => {
        const newRecords = records.filter(r => r.id !== id);
        setRecords(newRecords);
        syncToCloud('records', newRecords);
        setIsModalOpen(false);
      };

      // --- 設定與系統操作 ---
      const handleSettingsClick = () => {
        if (activeTab === 'settings') {
          setActiveTab('calendar');
        } else {
          if (isSettingsUnlocked) {
            setActiveTab('settings');
          } else {
            setPwdInput('');
            setPwdError('');
            setShowPwdModal(true);
          }
        }
      };

      const verifyPassword = (e) => {
        e.preventDefault();
        if (pwdInput === SETTINGS_PASSWORD) {
          setIsSettingsUnlocked(true);
          setShowPwdModal(false);
          setActiveTab('settings');
        } else {
          setPwdError('密碼錯誤，請重新輸入');
          setPwdInput('');
        }
      };

      const handleUpdateTeachers = (newTeachersList) => {
        setTeachers(newTeachersList);
        syncToCloud('teachers', newTeachersList);
      };
      const handleUpdateClasses = (newClassesList) => {
        setClasses(newClassesList);
        syncToCloud('classes', newClassesList);
      };
      const handleUpdateSlots = (newSlotsList) => {
        setSlots(newSlotsList);
        syncToCloud('slots', newSlotsList);
      };

      const handleCleanupRecords = () => {
        if (!cleanupDate) {
          alert("請先選擇一個日期！");
          return;
        }
        const confirmMsg = `⚠️ 警告：這將會永久刪除 ${cleanupDate} 之前的所有調堂記錄！\n\n確定要繼續嗎？`;
        if (window.confirm(confirmMsg)) {
          const newRecords = records.filter(r => r.date >= cleanupDate);
          const deletedCount = records.length - newRecords.length;
          setRecords(newRecords);
          syncToCloud('records', newRecords);
          alert(`✅ 清理完成！共刪除了 ${deletedCount} 筆舊記錄。`);
          setCleanupDate('');
        }
      };

      const handleDragStart = (e, index) => {
        setDraggedIdx(index);
        e.dataTransfer.effectAllowed = "move";
      };
      const handleDragOver = (e, index) => { e.preventDefault(); };
      const handleDrop = (e, index) => {
        e.preventDefault();
        if (draggedIdx === null || draggedIdx === index) return;
        const newSlots = [...slots];
        const draggedItem = newSlots[draggedIdx];
        newSlots.splice(draggedIdx, 1);
        newSlots.splice(index, 0, draggedItem);
        handleUpdateSlots(newSlots);
        setDraggedIdx(null);
      };
      const updateSlot = (id, field, value) => {
        const newSlots = slots.map(s => s.id === id ? { ...s, [field]: value } : s);
        handleUpdateSlots(newSlots);
      };
      const addSlot = () => {
        const newSlot = { id: `s_${Date.now()}`, name: '新課節', time: '00:00-00:00', isOpen: true, days: [1,2,3,4,5] };
        handleUpdateSlots([...slots, newSlot]);
      };
      const removeSlot = (id) => { handleUpdateSlots(slots.filter(s => s.id !== id)); };

      // === 畫面區塊渲染 ===
      if (isAppLoading) {
        return <div className="h-screen w-full flex items-center justify-center bg-gray-50"><div className="text-blue-600 font-bold text-xl animate-pulse">系統載入中...</div></div>;
      }

      const renderHeader = () => (
        <div className="bg-[#1e2336] text-white flex flex-col shadow-md relative z-10">
          {/* 同步進度條 */}
          {isSyncing && (
            <div className="absolute top-0 left-0 w-full h-1 bg-blue-900 overflow-hidden">
              <div className="h-full bg-blue-400 animate-pulse w-full"></div>
            </div>
          )}

          {/* 大標題 */}
          <div className="text-center pt-3 sm:pt-4 pb-1 text-lg sm:text-xl font-bold tracking-wider w-full">
            樂華天主教小學 - 調堂記錄表
          </div>

          {/* 控制面板 */}
          <div className="p-3 sm:p-4 pt-2 flex flex-col sm:flex-row justify-between items-center w-full">
            
            {/* 左側：日期導覽按鈕 */}
            <div className="flex items-center space-x-2 mb-2 sm:mb-0">
              <button onClick={prevDate} className="p-1 hover:bg-slate-700 rounded"><Icons.ChevronLeft /></button>
              <button onClick={goToToday} className="px-3 py-1 text-sm bg-slate-700 hover:bg-slate-600 rounded">今日</button>
              <button className="p-1 hover:bg-slate-700 rounded relative group">
                  <Icons.Calendar />
                  <input type="date" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => setCurrentDate(new Date(e.target.value))} />
              </button>
              <button onClick={nextDate} className="p-1 hover:bg-slate-700 rounded"><Icons.ChevronRight /></button>
            </div>

            {/* 中間：顯示當前年月 */}
            <div className="flex items-center gap-2">
              <h1 className="text-xl sm:text-2xl font-bold tracking-widest italic">
                {currentDate.getFullYear()} 年 {currentDate.getMonth() + 1} 月
              </h1>
              {isSyncing && <Icons.CloudSync className="animate-bounce text-blue-300" />}
            </div>

            {/* 右側：模式切換及設定按鈕 */}
            <div className="flex space-x-2 mt-2 sm:mt-0">
              <div className="bg-slate-900 rounded flex p-1">
                <button onClick={() => {setViewMode('week'); setActiveTab('calendar');}} className={`px-3 py-1 text-sm rounded ${viewMode === 'week' && activeTab === 'calendar' ? 'bg-blue-600' : 'hover:bg-slate-700'}`}>週</button>
                <button onClick={() => {setViewMode('day'); setActiveTab('calendar');}} className={`px-3 py-1 text-sm rounded ${viewMode === 'day' && activeTab === 'calendar' ? 'bg-blue-600' : 'hover:bg-slate-700'}`}>日</button>
              </div>
              <button onClick={handleSettingsClick} className={`p-2 rounded ${activeTab === 'settings' ? 'bg-blue-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
                {activeTab === 'settings' ? <Icons.Home /> : <Icons.Settings />}
              </button>
            </div>
          </div>
        </div>
      );

      const renderPasswordModal = () => {
        if (!showPwdModal) return null;
        return (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-[fadeIn_0.2s_ease-out]">
              <div className="bg-[#1e2336] text-white p-4 flex items-center gap-2">
                <Icons.Lock size={20} />
                <h3 className="font-bold text-lg">安全驗證</h3>
                <button onClick={() => setShowPwdModal(false)} className="ml-auto hover:bg-slate-700 p-1 rounded"><Icons.X /></button>
              </div>
              <form onSubmit={verifyPassword} className="p-6">
                <p className="text-sm text-gray-600 mb-4">請輸入密碼以進入系統設定頁面：</p>
                <input 
                  type="password" 
                  autoFocus
                  value={pwdInput} 
                  onChange={(e) => { setPwdInput(e.target.value); setPwdError(''); }} 
                  placeholder="請輸入密碼" 
                  className={`w-full border p-3 rounded-lg text-center tracking-widest text-lg focus:outline-none focus:ring-2 ${pwdError ? 'border-red-500 focus:ring-red-200' : 'focus:ring-blue-500'}`}
                />
                {pwdError && <p className="text-red-500 text-sm font-bold mt-2 text-center">{pwdError}</p>}
                <div className="mt-6 flex gap-3">
                  <button type="button" onClick={() => setShowPwdModal(false)} className="flex-1 py-2.5 border border-gray-300 rounded-lg text-gray-700 font-bold hover:bg-gray-50">取消</button>
                  <button type="submit" className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md">確認</button>
                </div>
              </form>
            </div>
          </div>
        );
      };

      const renderCalendarView = () => {
        const daysOfWeek = ['日', '一', '二', '三', '四', '五', '六'];
        const gridColsClass = viewMode === 'week' ? 'grid-cols-[6rem_repeat(5,minmax(0,1fr))]' : 'grid-cols-[6rem_minmax(0,1fr)]';

        return (
          <div className="flex-1 overflow-auto bg-gray-50 p-2 sm:p-4">
            <div className="bg-white border rounded-lg shadow-sm overflow-hidden min-w-[800px]">
              <div className={`grid border-b bg-blue-600 text-white ${gridColsClass}`}>
                <div className="border-r border-blue-500 p-3 text-center font-bold flex flex-col justify-center">節數</div>
                {displayedDays.map(day => (
                  <div key={day.toString()} className="border-r border-blue-500 p-3 text-center min-w-0">
                    <div className="text-sm font-medium opacity-80">星期{daysOfWeek[day.getDay()]}</div>
                    <div className="text-2xl font-black">{day.getDate()}日</div>
                  </div>
                ))}
              </div>

              <div className="flex flex-col">
                {slots.map((slot) => (
                  <div key={slot.id} className={`grid border-b min-h-[80px] ${gridColsClass}`}>
                    <div className="border-r p-2 flex flex-col items-center justify-center bg-gray-50">
                      <span className="font-bold text-sm text-slate-700 text-center">{slot.name}</span>
                      <span className="text-xs text-slate-500 text-center">{slot.time}</span>
                    </div>

                    {displayedDays.map(day => {
                      const dateStr = formatDateStr(day);
                      const dayOfWeek = day.getDay();
                      const isApplicable = slot.days.includes(dayOfWeek);
                      
                      if (!isApplicable || !slot.isOpen) {
                        return <div key={dateStr} className="border-r bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,#f3f4f6_10px,#f3f4f6_20px)] min-w-0 h-full"></div>;
                      }

                      const cellRecords = records.filter(r => r.date === dateStr && r.slotId === slot.id);

                      return (
                        <div key={dateStr} 
                             className="border-r p-1.5 relative group hover:bg-blue-50/50 transition-colors flex flex-col gap-1.5 cursor-pointer min-w-0 h-full"
                             onClick={(e) => { if(e.target === e.currentTarget) openAddModal(day, slot.id); }}>
                          
                          {cellRecords.map(record => (
                            <div key={record.id} 
                                 onClick={(e) => { e.stopPropagation(); openEditModal(record); }}
                                 className={`px-2 py-1.5 text-sm rounded border shadow-sm ${record.color} cursor-pointer hover:opacity-80 transition-opacity`}>
                              <div className="font-bold">
                                {record.entries.map((entry, i) => (
                                  <span key={i}>{entry.teacher}({entry.class}){i < record.entries.length - 1 && '、'}</span>
                                ))}
                              </div>
                              {record.note && <div className="text-xs opacity-80 mt-0.5">{record.note}</div>}
                            </div>
                          ))}

                          <div onClick={(e) => { e.stopPropagation(); openAddModal(day, slot.id); }}
                               className={`w-full h-8 border border-dashed border-gray-400 rounded bg-gray-50/50 text-gray-400 flex items-center justify-center hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300 transition-all cursor-pointer mt-auto
                                         ${cellRecords.length > 0 ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
                            <Icons.Plus />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const renderSettingsView = () => (
        <div className="flex-1 overflow-auto bg-gray-50 p-4">
          <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border overflow-hidden">
            <div className="flex border-b bg-gray-100 overflow-x-auto hide-scrollbar">
              {['teachers', 'classes', 'slots', 'system'].map(tab => (
                <button key={tab} onClick={() => setSettingTab(tab)}
                        className={`flex-1 min-w-[100px] py-3 text-sm font-bold text-center border-r last:border-0 transition-colors ${settingTab === tab ? 'bg-white text-blue-600 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>
                  {tab === 'teachers' ? '教師設定' : tab === 'classes' ? '班別設定' : tab === 'slots' ? '課節設定' : '系統維護'}
                </button>
              ))}
            </div>

            <div className="p-6">
              {settingTab === 'teachers' && (
                <div>
                  <h3 className="text-lg font-bold mb-4">管理教師名單</h3>
                  <div className="flex gap-2 mb-6 bg-gray-50 p-4 rounded-lg border">
                    <input type="text" placeholder="全名" value={newTeacherName} onChange={e => setNewTeacherName(e.target.value)} className="flex-1 border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500"/>
                    <input type="text" placeholder="簡稱 (例: 陳)" value={newTeacherShort} onChange={e => setNewTeacherShort(e.target.value)} className="w-24 border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500"/>
                    <button onClick={() => { if(newTeacherName && newTeacherShort) { handleUpdateTeachers([...teachers, { id: Date.now(), name: newTeacherName, shortName: newTeacherShort }]); setNewTeacherName(''); setNewTeacherShort(''); } }} className="bg-blue-600 text-white px-4 rounded font-bold hover:bg-blue-700">新增</button>
                  </div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    {teachers.map(t => (
                      <div key={t.id} className="border p-3 rounded-lg flex justify-between items-center bg-white shadow-sm">
                        <div><div className="font-bold">{t.shortName}</div><div className="text-xs text-gray-500">{t.name}</div></div>
                        <button onClick={() => handleUpdateTeachers(teachers.filter(item => item.id !== t.id))} className="text-gray-400 hover:text-red-500"><Icons.Trash2 /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {settingTab === 'classes' && (
                <div>
                  <h3 className="text-lg font-bold mb-4">管理班別</h3>
                  <div className="flex gap-2 mb-6 bg-gray-50 p-4 rounded-lg border max-w-sm">
                    <input type="text" placeholder="班別名稱 (例: 1A)" value={newClass} onChange={e => setNewClass(e.target.value)} className="flex-1 border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500"/>
                    <button onClick={() => { if(newClass && !classes.includes(newClass)) { handleUpdateClasses([...classes, newClass]); setNewClass(''); } }} className="bg-blue-600 text-white px-4 rounded font-bold hover:bg-blue-700">新增</button>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {classes.map(c => (
                      <div key={c} className="border bg-white px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 shadow-sm">
                        {c} <button onClick={() => handleUpdateClasses(classes.filter(item => item !== c))} className="text-gray-400 hover:text-red-500"><Icons.X size={14} /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {settingTab === 'slots' && (
                <div>
                   <div className="flex justify-between items-center mb-4">
                     <h3 className="text-xl font-bold">課節列表管理</h3>
                     <button onClick={addSlot} className="flex items-center gap-1 border border-blue-600 text-blue-600 bg-blue-50 px-3 py-1.5 rounded hover:bg-blue-100 font-bold text-sm">
                       <Icons.Plus /> 新增課節
                     </button>
                   </div>
                   <div className="bg-blue-50/50 border border-blue-100 p-4 rounded-lg mb-6 text-sm text-gray-600 leading-relaxed">
                     💡 系統會自動將修改同步至雲端。按住最左側的圖示上下拖曳可更改順序。
                   </div>
                   <div className="space-y-3 pb-8">
                     {slots.map((slot, index) => (
                       <div key={slot.id} draggable onDragStart={(e) => handleDragStart(e, index)} onDragOver={(e) => handleDragOver(e, index)} onDrop={(e) => handleDrop(e, index)} className={`flex border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm hover:border-gray-300 transition-colors ${draggedIdx === index ? 'opacity-50' : ''}`}>
                         <div className="w-10 bg-gray-50 flex items-center justify-center cursor-move border-r border-gray-100 text-gray-400 hover:text-gray-600 hover:bg-gray-200">
                           <Icons.GripVertical />
                         </div>
                         <div className="flex-1 p-4">
                           <div className="flex flex-wrap sm:flex-nowrap items-center gap-4 mb-3">
                             <div className="flex items-center gap-2 text-gray-400 w-6">
                               <Icons.GripVertical className="invisible sm:hidden" />
                             </div>
                             <input type="text" value={slot.name} onChange={(e) => updateSlot(slot.id, 'name', e.target.value)} placeholder="課節名稱" className="border p-2 rounded w-40 sm:w-48 font-bold text-gray-700 outline-none focus:ring-2 focus:ring-blue-500" />
                             <input type="text" value={slot.time} onChange={(e) => updateSlot(slot.id, 'time', e.target.value)} placeholder="時間" className="border p-2 rounded w-40 text-gray-600 outline-none focus:ring-2 focus:ring-blue-500" />
                             
                             <div className="flex items-center gap-4 ml-auto">
                               <label className="flex items-center gap-2 cursor-pointer bg-blue-50 px-3 py-1.5 rounded-full">
                                  <input type="checkbox" checked={slot.isOpen} onChange={(e) => updateSlot(slot.id, 'isOpen', e.target.checked)} className="w-4 h-4 accent-blue-600 cursor-pointer" />
                                  <span className="text-sm font-bold text-blue-800">開放填寫</span>
                               </label>
                               <button onClick={() => removeSlot(slot.id)} className="p-2 text-gray-400 hover:text-red-600 bg-gray-50 rounded-full hover:bg-red-50">
                                  <Icons.Trash2 size={18} />
                               </button>
                             </div>
                           </div>
                           <div className="flex flex-wrap items-center gap-4 text-sm pl-8">
                             <span className="text-gray-500 font-medium">適用日子：</span>
                             <div className="flex flex-wrap gap-4">
                               {[1,2,3,4,5].map(d => (
                                 <label key={d} className="flex items-center gap-1.5 cursor-pointer">
                                   <input type="checkbox" checked={slot.days.includes(d)} onChange={(e) => {
                                       const newDays = e.target.checked ? [...slot.days, d].sort() : slot.days.filter(day => day !== d);
                                       updateSlot(slot.id, 'days', newDays);
                                     }} className="w-4 h-4 accent-blue-600 cursor-pointer" />
                                   <span className="text-gray-700">星期{['一','二','三','四','五'][d-1]}</span>
                                 </label>
                               ))}
                             </div>
                           </div>
                         </div>
                       </div>
                     ))}
                   </div>
                </div>
              )}

              {/* 新增的系統維護分頁 */}
              {settingTab === 'system' && (
                <div>
                  <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-red-700">
                    <Icons.AlertTriangle size={22} /> 系統維護與空間清理
                  </h3>
                  <div className="bg-red-50 border border-red-200 p-6 rounded-xl shadow-sm">
                    <p className="text-gray-700 mb-6 leading-relaxed">
                      隨著學年推移，累積過多的歷史調堂記錄會導致網頁載入速度變慢。建議您每學期或每學年結束後，清理不需要的舊記錄。
                      <br/><span className="font-bold text-red-600">注意：刪除後的資料無法復原，請確保您不再需要這些舊資料。</span>
                    </p>
                    
                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 bg-white p-4 rounded-lg border border-red-100">
                      <label className="text-sm font-bold text-gray-700 shrink-0">
                        永久刪除 <span className="text-red-600">此日期之前</span> 的所有記錄：
                      </label>
                      <input 
                        type="date" 
                        value={cleanupDate}
                        onChange={(e) => setCleanupDate(e.target.value)}
                        className="border p-2.5 rounded outline-none focus:ring-2 focus:ring-red-400 bg-gray-50 w-full sm:w-auto"
                      />
                      <button 
                        onClick={handleCleanupRecords}
                        className="bg-red-600 text-white px-5 py-2.5 rounded-lg font-bold hover:bg-red-700 shadow-md transition-colors w-full sm:w-auto flex items-center justify-center gap-2">
                        <Icons.Trash2 size={18} /> 執行清理
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );

      const renderRecordModal = () => {
        if (!isModalOpen) return null;
        return (
          <RecordModalForm 
            editingRecord={editingRecord} 
            selectedSlotInfo={selectedSlotInfo}
            teachers={teachers}
            classes={classes}
            Icons={Icons}
            onClose={() => setIsModalOpen(false)}
            onSave={saveRecord}
            onDelete={deleteRecord}
          />
        );
      };

      return (
        <div className="flex flex-col h-screen w-full bg-gray-100 font-sans overflow-hidden">
          {renderHeader()}
          {activeTab === 'calendar' ? renderCalendarView() : renderSettingsView()}
          {renderPasswordModal()}
          {renderRecordModal()}
        </div>
      );
    }

    function RecordModalForm({ editingRecord, selectedSlotInfo, teachers, classes, Icons, onClose, onSave, onDelete }) {
      const [entries, setEntries] = useState(
        editingRecord ? editingRecord.entries : [{ teacher: '', class: '', customTeacher: '', customClass: '' }, { teacher: '', class: '', customTeacher: '', customClass: '' }]
      );
      const [note, setNote] = useState(editingRecord ? editingRecord.note : '');
      const [errorMsg, setErrorMsg] = useState('');
      const [isConfirmingDelete, setIsConfirmingDelete] = useState(false);

      const handleEntryChange = (index, field, value) => {
        const newEntries = [...entries];
        newEntries[index][field] = value;
        setEntries(newEntries);
      };

      const addEntry = () => setEntries([...entries, { teacher: '', class: '', customTeacher: '', customClass: '' }]);

      const handleSubmit = (e) => {
        e.preventDefault();
        setErrorMsg('');
        const processedEntries = entries.map(entry => ({
          teacher: entry.teacher === '其他' ? entry.customTeacher : entry.teacher,
          class: entry.class === '其他' ? entry.customClass : entry.class
        })).filter(entry => entry.teacher && entry.class);

        if (processedEntries.length === 0) {
          setErrorMsg('請至少填寫一位老師及班別！');
          return;
        }
        onSave({ entries: processedEntries, note });
      };

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-full">
            <div className="bg-blue-600 text-white p-4 flex justify-between items-center shrink-0">
              <h3 className="font-bold text-lg tracking-wide">{editingRecord ? '編輯調堂記錄' : '新增調堂記錄'}</h3>
              <button onClick={onClose} className="hover:bg-blue-700 p-1 rounded transition-colors"><Icons.X /></button>
            </div>
            
            <form onSubmit={handleSubmit} className="p-5 overflow-y-auto">
              <div className="mb-5 text-sm text-blue-800 font-bold bg-blue-50 p-2.5 rounded-lg border border-blue-100 flex items-center">
                <Icons.Calendar className="mr-2" size={16} />
                {editingRecord ? editingRecord.date : selectedSlotInfo?.date}
              </div>

              {entries.map((entry, index) => (
                <div key={index} className="mb-4 p-4 border rounded-xl bg-gray-50/50 relative border-gray-200">
                  <h4 className="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span className="bg-gray-200 text-gray-600 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2">{index + 1}</span>
                    教師資料 {index === 0 ? <span className="text-red-500 ml-1">*</span> : <span className="text-xs font-normal text-gray-400 ml-2">(非必填)</span>}
                  </h4>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1.5">教師</label>
                      <select value={entry.teacher} onChange={(e) => handleEntryChange(index, 'teacher', e.target.value)} className="w-full border p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">請選擇</option>
                        {teachers.map(t => <option key={t.id} value={t.shortName}>{t.name}</option>)}
                        <option value="其他">其他...</option>
                      </select>
                      {entry.teacher === '其他' && <input type="text" placeholder="自行填寫" value={entry.customTeacher} onChange={(e) => handleEntryChange(index, 'customTeacher', e.target.value)} className="w-full border p-2 rounded-lg text-sm mt-2 focus:ring-2 focus:ring-blue-500 outline-none"/>}
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1.5">調往班別</label>
                      <select value={entry.class} onChange={(e) => handleEntryChange(index, 'class', e.target.value)} className="w-full border p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">請選擇</option>
                        {classes.map(c => <option key={c} value={c}>{c}</option>)}
                        <option value="其他">其他...</option>
                      </select>
                      {entry.class === '其他' && <input type="text" placeholder="自行填寫" value={entry.customClass} onChange={(e) => handleEntryChange(index, 'customClass', e.target.value)} className="w-full border p-2 rounded-lg text-sm mt-2 focus:ring-2 focus:ring-blue-500 outline-none"/>}
                    </div>
                  </div>
                </div>
              ))}

              <button type="button" onClick={addEntry} className="w-full py-2.5 border-2 border-dashed border-blue-200 text-blue-600 rounded-xl text-sm font-bold hover:bg-blue-50 mb-5 flex items-center justify-center transition-colors">
                <Icons.Plus className="mr-1" /> 新增更多老師
              </button>

              <div className="mb-6">
                <label className="block text-sm font-bold text-gray-700 mb-2">備註</label>
                <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="如：代課、開會..." className="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
              </div>

              {errorMsg && <div className="text-red-500 text-sm font-bold mb-3 bg-red-50 p-2 rounded">{errorMsg}</div>}

              <div className="flex justify-end gap-3 pt-4 border-t">
                {editingRecord && (
                  isConfirmingDelete ? (
                    <div className="flex items-center gap-2 mr-auto bg-red-50 p-1.5 rounded-lg border border-red-100">
                      <span className="text-xs text-red-600 font-bold px-1">確定刪除？</span>
                      <button type="button" onClick={() => onDelete(editingRecord.id)} className="px-3 py-1 bg-red-600 text-white rounded text-xs font-bold hover:bg-red-700 shadow-sm transition-colors">是</button>
                      <button type="button" onClick={() => setIsConfirmingDelete(false)} className="px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs font-bold hover:bg-gray-300 shadow-sm transition-colors">否</button>
                    </div>
                  ) : (
                    <button type="button" onClick={() => setIsConfirmingDelete(true)} className="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold hover:bg-red-100 mr-auto flex items-center transition-colors">
                      <Icons.Trash2 className="mr-1"/> 刪除
                    </button>
                  )
                )}
                <button type="button" onClick={onClose} className="px-5 py-2 border border-gray-300 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-50 transition-colors">取消</button>
                <button type="submit" className="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-md transition-colors">儲存記錄</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // --- 初始化渲染引擎 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
