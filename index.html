<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>樂華天主教小學 - 調堂記錄表 v4.1</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; max-width: 100vw; overflow: hidden; background-color: #f3f4f6; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .smooth-scroll { scroll-behavior: smooth; }
  </style>

  <script>
  // 1. 請確認這裡是您真實的 API 網址 (與您原本程式碼中的 API_URL 相同)
  const PREFETCH_API_URL = 'https://script.google.com/macros/s/AKfycbz-r3TuJSyiQ8LV_VIjX64oNpSYrJbva72lvUNeK4V2uQ-I1-4KI8W1dDyCY2gjpmNQ/exec';

  // 2. 網頁一開始解析，就立刻在背景偷抓資料 (提早起跑)
  window.__prefetchedResponse = fetch(PREFETCH_API_URL + '?action=getRecords')
    .then(res => res.clone()) // 複製一份 Response，避免被讀取兩次出錯
    .catch(err => console.warn('預載失敗，稍後將正常請求:', err));

  // 3. 攔截器：當 React 呼叫 fetch 時，攔截它！
  const originalFetch = window.fetch;
  window.fetch = async function(...args) {
    const requestUrl = args[0];
    
    // 如果發現 React 正在請求 getRecords，而且我們已經有提早抓好的資料
    if (typeof requestUrl === 'string' && 
        requestUrl.includes('action=getRecords') && 
        window.__prefetchedResponse) {
        
      console.log("🚀 攔截成功！直接餵給 React 預載的資料，實現秒開！");
      const res = await window.__prefetchedResponse;
      window.__prefetchedResponse = null; // 用過就清空，確保之後的「重新整理」能抓到最新資料
      return res.clone();
    }
    
    // 如果是其他請求，就乖乖放行，照常執行
    return originalFetch.apply(this, args);
  };
</script>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const API_URL = 'https://script.google.com/macros/s/AKfycbz-r3TuJSyiQ8LV_VIjX64oNpSYrJbva72lvUNeK4V2uQ-I1-4KI8W1dDyCY2gjpmNQ/exec';
    const SETTINGS_PASSWORD = '535800'; 

    const Icons = {
      ChevronLeft: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>,
      ChevronRight: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m9 18 6-6-6-6"/></svg>,
      Calendar: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
      Settings: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Home: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Plus: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>,
      X: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>,
      GripVertical: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>,
      Trash2: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      CloudSync: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg>,
      Lock: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      AlertTriangle: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
    };

    const initialSlots = [
      { id: 's1', name: '課前一', time: '07:30-07:45', isOpen: true, days: [1,2,3,4,5] },
      { id: 's4', name: '第一節', time: '08:25-08:55', isOpen: true, days: [1,2,3,4,5] },
      { id: 's18', name: '樂Kids MI', time: '13:55-15:00', isOpen: true, days: [5] }
    ];
    const pastelColors = ['bg-red-100 border-red-200 text-red-800', 'bg-blue-100 border-blue-200 text-blue-800', 'bg-green-100 border-green-200 text-green-800', 'bg-yellow-100 border-yellow-200 text-yellow-800', 'bg-purple-100 border-purple-200 text-purple-800', 'bg-pink-100 border-pink-200 text-pink-800'];

    function App() {
      const [isAppLoading, setIsAppLoading] = useState(true);
      const [isSyncing, setIsSyncing] = useState(false);

      const [currentDate, setCurrentDate] = useState(new Date());
      const [viewMode, setViewMode] = useState('week'); 
      const [activeTab, setActiveTab] = useState('calendar'); 
      
      const [teachers, setTeachers] = useState([{ id: 1, name: '陳大文', shortName: '陳' }]);
      const [classes, setClasses] = useState(['1A', '2A', '空堂']);
      const [slots, setSlots] = useState(initialSlots);
      const [records, setRecords] = useState([]);

      const [settingTab, setSettingTab] = useState('slots'); 
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherShort, setNewTeacherShort] = useState('');
      const [newClass, setNewClass] = useState('');
      const [draggedIdx, setDraggedIdx] = useState(null); 
      const [cleanupDate, setCleanupDate] = useState('');

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingRecord, setEditingRecord] = useState(null);
      const [selectedSlotInfo, setSelectedSlotInfo] = useState(null);

      const [isSettingsUnlocked, setIsSettingsUnlocked] = useState(false);
      const [showPwdModal, setShowPwdModal] = useState(false);
      const [pwdInput, setPwdInput] = useState('');
      const [pwdError, setPwdError] = useState('');

      // --- 資料載入 ---
      useEffect(() => {
        if (!API_URL) { setIsAppLoading(false); return; }
        fetch(API_URL + "?action=getData")
          .then(res => res.json())
          .then(res => {
            if (res.status === 'success') {
              if (res.data.records?.length > 0) setRecords(res.data.records);
              if (res.data.slots?.length > 0) setSlots(res.data.slots);
              if (res.data.teachers?.length > 0) setTeachers(res.data.teachers);
              if (res.data.classes?.length > 0) setClasses(res.data.classes);
            }
          })
          .catch(err => console.error("資料載入失敗", err))
          .finally(() => setIsAppLoading(false));
      }, []);

      const syncToCloud = async (type, dataToSync) => {
        if (!API_URL) return;
        setIsSyncing(true);
        try {
          await fetch(API_URL, {
            method: 'POST', redirect: 'follow',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ type, data: dataToSync })
          });
        } catch (e) {
          console.error("同步失敗", e);
        }
        setIsSyncing(false);
      };

      // --- 螢幕尺寸監聽 ---
      useEffect(() => {
        const handleResize = () => {
          if (viewMode === 'week') setViewMode('day');
        };
      }, [viewMode]);

      // --- 日曆運算 ---
      const getStartOfWeek = (date) => {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
      };

      const currentWeekDays = useMemo(() => {
        const start = getStartOfWeek(currentDate);
        return Array.from({ length: 5 }).map((_, i) => { 
          const d = new Date(start); d.setDate(start.getDate() + i); return d;
        });
      }, [currentDate]);

      const displayedDays = viewMode === 'week' ? currentWeekDays : [currentDate];
      
      const formatDateStr = (date) => {
        const d = new Date(date);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const prevDate = () => {
        const newDate = new Date(currentDate);
        newDate.setDate(currentDate.getDate() - (viewMode === 'week' ? 7 : 1));
        if (viewMode === 'day' && newDate.getDay() === 0) newDate.setDate(newDate.getDate() - 2);
        if (viewMode === 'day' && newDate.getDay() === 6) newDate.setDate(newDate.getDate() - 1);
        setCurrentDate(newDate);
      };

      const nextDate = () => {
        const newDate = new Date(currentDate);
        newDate.setDate(currentDate.getDate() + (viewMode === 'week' ? 7 : 1));
        if (viewMode === 'day' && newDate.getDay() === 6) newDate.setDate(newDate.getDate() + 2);
        if (viewMode === 'day' && newDate.getDay() === 0) newDate.setDate(newDate.getDate() + 1);
        setCurrentDate(newDate);
      };

      const goToToday = () => setCurrentDate(new Date());

      // --- 記錄操作 ---
      const openAddModal = (date, slotId) => { setSelectedSlotInfo({ date: formatDateStr(date), slotId }); setEditingRecord(null); setIsModalOpen(true); };
      const openEditModal = (record) => { setEditingRecord(record); setIsModalOpen(true); };
      const saveRecord = (formData) => {
        let newRecords;
        if (editingRecord) { newRecords = records.map(r => r.id === editingRecord.id ? { ...r, ...formData } : r); } 
        else { newRecords = [...records, { ...formData, id: `r_${Date.now()}`, date: selectedSlotInfo.date, slotId: selectedSlotInfo.slotId, color: pastelColors[Math.floor(Math.random() * pastelColors.length)] }]; }
        setRecords(newRecords); syncToCloud('records', newRecords); setIsModalOpen(false);
      };
      const deleteRecord = (id) => { const newRecords = records.filter(r => r.id !== id); setRecords(newRecords); syncToCloud('records', newRecords); setIsModalOpen(false); };

      // --- 設定操作 ---
      const handleSettingsClick = () => {
        if (activeTab === 'settings') setActiveTab('calendar');
        else if (isSettingsUnlocked) setActiveTab('settings');
        else { setPwdInput(''); setPwdError(''); setShowPwdModal(true); }
      };
      const verifyPassword = (e) => {
        e.preventDefault();
        if (pwdInput === SETTINGS_PASSWORD) { setIsSettingsUnlocked(true); setShowPwdModal(false); setActiveTab('settings'); } 
        else { setPwdError('密碼錯誤'); setPwdInput(''); }
      };
      const handleUpdateTeachers = (data) => { setTeachers(data); syncToCloud('teachers', data); };
      const handleUpdateClasses = (data) => { setClasses(data); syncToCloud('classes', data); };
      const handleUpdateSlots = (data) => { setSlots(data); syncToCloud('slots', data); };
      
      // 修復：新增這三個原本遺漏的課節操作函式
      const addSlot = () => { handleUpdateSlots([...slots, { id: 's' + Date.now(), name: '新課節', time: '', isOpen: true, days: [1,2,3,4,5] }]); };
      const updateSlot = (id, field, value) => { handleUpdateSlots(slots.map(s => s.id === id ? { ...s, [field]: value } : s)); };
      const removeSlot = (id) => { handleUpdateSlots(slots.filter(s => s.id !== id)); };

      const handleCleanupRecords = () => {
        if (!cleanupDate) { alert("請先選擇一個日期！"); return; }
        if (window.confirm(`⚠️ 警告：這將會永久刪除 ${cleanupDate} 之前的所有調堂記錄！\n\n確定要繼續嗎？`)) {
          const newRecords = records.filter(r => r.date >= cleanupDate);
          setRecords(newRecords); syncToCloud('records', newRecords);
          alert(`✅ 清理完成！`); setCleanupDate('');
        }
      };

      const handleDragStart = (e, index) => { setDraggedIdx(index); e.dataTransfer.effectAllowed = "move"; };
      const handleDrop = (e, index) => {
        e.preventDefault(); if (draggedIdx === null || draggedIdx === index) return;
        const newSlots = [...slots]; const draggedItem = newSlots[draggedIdx];
        newSlots.splice(draggedIdx, 1); newSlots.splice(index, 0, draggedItem);
        handleUpdateSlots(newSlots); setDraggedIdx(null);
      };

      // === RENDER ===
      if (isAppLoading) return <div className="h-screen w-full flex items-center justify-center bg-gray-50"><div className="text-blue-600 font-bold text-xl animate-pulse">系統載入中...</div></div>;

      const renderHeader = () => (
        <div className="bg-[#1e2336] text-white flex flex-col shadow-md relative z-50">
          {isSyncing && <div className="absolute top-0 left-0 w-full h-1 bg-blue-900 overflow-hidden"><div className="h-full bg-blue-400 animate-pulse w-full"></div></div>}
          <div className="text-center pt-3 pb-1 text-base sm:text-xl font-bold tracking-wider w-full px-2 truncate">
            樂華天主教小學 - 調堂記錄表
          </div>
          <div className="p-2 sm:p-4 pt-1 sm:pt-2 flex flex-col sm:flex-row justify-between items-center w-full gap-2 sm:gap-0">
            <div className="flex items-center space-x-1 sm:space-x-2 w-full sm:w-auto justify-between sm:justify-start">
              <div className="flex items-center">
                <button onClick={prevDate} className="p-2 sm:p-1 hover:bg-slate-700 rounded"><Icons.ChevronLeft /></button>
                <button onClick={goToToday} className="px-3 py-1.5 sm:py-1 text-sm bg-slate-700 hover:bg-slate-600 rounded mx-1 font-medium">今日</button>
                <button className="p-1.5 sm:p-2 hover:bg-slate-700 rounded relative group flex items-center touch-manipulation overflow-hidden">
                    <Icons.Calendar size={16}/>
                    <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" onChange={(e) => setCurrentDate(new Date(e.target.value))} />
                </button>
                <button onClick={nextDate} className="p-2 sm:p-1 hover:bg-slate-700 rounded"><Icons.ChevronRight /></button>
              </div>
              
              <div className="sm:hidden flex space-x-1">
                 <button onClick={() => {setViewMode('week'); setActiveTab('calendar');}} className={`px-2 py-1 text-xs rounded ${viewMode === 'week' && activeTab === 'calendar' ? 'bg-blue-600' : 'bg-slate-800'}`}>週</button>
                 <button onClick={() => {setViewMode('day'); setActiveTab('calendar');}} className={`px-2 py-1 text-xs rounded ${viewMode === 'day' && activeTab === 'calendar' ? 'bg-blue-600' : 'bg-slate-800'}`}>日</button>
                 <button onClick={handleSettingsClick} className={`px-2 py-1 rounded flex items-center justify-center ${activeTab === 'settings' ? 'bg-blue-600' : 'bg-slate-800'}`}>
                   {activeTab === 'settings' ? <Icons.Home size={14} /> : <Icons.Settings size={14} />}
                 </button>
              </div>
            </div>

            <div className="flex items-center gap-2">
              <h1 className="text-lg sm:text-2xl font-bold tracking-widest italic">
                {currentDate.getFullYear()} 年 {currentDate.getMonth() + 1} 月
              </h1>
              {isSyncing && <Icons.CloudSync className="animate-bounce text-blue-300" />}
            </div>

            <div className="hidden sm:flex space-x-2">
              <div className="bg-slate-900 rounded flex p-1">
                <button onClick={() => {setViewMode('week'); setActiveTab('calendar');}} className={`px-3 py-1 text-sm rounded ${viewMode === 'week' && activeTab === 'calendar' ? 'bg-blue-600' : 'hover:bg-slate-700'}`}>週</button>
                <button onClick={() => {setViewMode('day'); setActiveTab('calendar');}} className={`px-3 py-1 text-sm rounded ${viewMode === 'day' && activeTab === 'calendar' ? 'bg-blue-600' : 'hover:bg-slate-700'}`}>日</button>
              </div>
              <button onClick={handleSettingsClick} className={`p-2 rounded ${activeTab === 'settings' ? 'bg-blue-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
                {activeTab === 'settings' ? <Icons.Home /> : <Icons.Settings />}
              </button>
            </div>
          </div>
        </div>
      );

      const renderCalendarView = () => {
  const daysOfWeek = ['日', '一', '二', '三', '四', '五', '六'];
  
  const gridColsClass = viewMode === 'week' 
    ? 'grid-cols-[3.5rem_repeat(5,minmax(0,1fr))] sm:grid-cols-[5.5rem_repeat(5,minmax(0,1fr))]' 
    : 'grid-cols-[3.5rem_minmax(0,1fr)] sm:grid-cols-[5.5rem_minmax(0,1fr)]';

  return (
    <div className="flex-1 overflow-x-auto overflow-y-auto bg-gray-50 smooth-scroll relative">
      <div className="bg-white min-h-full w-full min-w-0 flex flex-col">
        
        {/* 表頭區塊維持不變 */}
        <div className={`grid border-b bg-blue-600 text-white sticky top-0 z-30 shadow-sm ${gridColsClass}`}>
          <div className="border-r border-blue-500 p-1 sm:p-2 text-center font-bold flex flex-col justify-center sticky left-0 z-40 bg-blue-700 text-xs sm:text-base min-w-0 break-words">
            節數
          </div>
          {displayedDays.map(day => (
            <div key={day.toString()} className="border-r border-blue-500 p-1 sm:p-2 text-center min-w-0">
              <div className="text-[10px] sm:text-sm font-medium opacity-90 truncate">星期{daysOfWeek[day.getDay()]}</div>
              <div className="text-base sm:text-xl font-black">{day.getDate()}</div>
            </div>
          ))}
        </div>

        <div className="flex flex-col flex-1">
          {slots.map((slot) => (
            /* 【修改 1】將列高大幅縮減：由 min-h-[80px] 縮減為 min-h-[45px] */
            <div key={slot.id} className={`grid border-b min-h-[45px] sm:min-h-[55px] ${gridColsClass}`}>
              
              {/* 【修改 2】縮減最左側節數的 padding (p-1 改為 p-0.5) */}
              <div className="border-r p-0.5 sm:p-1 flex flex-col items-center justify-center bg-gray-50 sticky left-0 z-20 shadow-[2px_0_4px_rgba(0,0,0,0.03)] border-r-gray-200 min-w-0">
                <span className="font-bold text-[10px] sm:text-sm text-slate-700 text-center leading-tight break-words">{slot.name}</span>
                <span className="text-[9px] sm:text-xs text-slate-500 text-center mt-0 leading-tight">{slot.time}</span>
              </div>

              {displayedDays.map(day => {
                const dateStr = formatDateStr(day);
                const isApplicable = slot.days.includes(day.getDay());
                
                if (!isApplicable || !slot.isOpen) {
                  return <div key={dateStr} className="border-r bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,#f3f4f6_10px,#f3f4f6_20px)] min-w-0 h-full"></div>;
                }

                const cellRecords = records.filter(r => r.date === dateStr && r.slotId === slot.id);

                return (
                  /* 【修改 3】縮減單元格的 padding 與 gap (gap-1 改為 gap-0.5) */
                  <div key={dateStr} 
                       className="border-r p-0.5 sm:p-1 relative group hover:bg-blue-50/50 transition-colors flex flex-col gap-0.5 cursor-pointer min-w-0 h-full"
                       onClick={(e) => { if(e.target === e.currentTarget) openAddModal(day, slot.id); }}>
                    
                    {cellRecords.map(record => (
                      /* 【修改 4】縮減內部記錄卡片的 padding (sm:py-2 改為 sm:py-0.5) */
                      <div key={record.id} 
                           onClick={(e) => { e.stopPropagation(); openEditModal(record); }}
                           className={`p-0.5 sm:px-1.5 sm:py-0.5 text-[10px] sm:text-[13px] rounded border shadow-sm ${record.color} cursor-pointer hover:opacity-80 active:scale-95 transition-all w-full overflow-hidden`}>
                        <div className="font-bold leading-none sm:leading-tight flex flex-wrap items-center gap-x-0.5">
                          {record.entries.map((entry, i) => (
                            <span key={i} className="flex items-center break-all">
                              {entry.teacher}({entry.class})
                              {i < record.entries.length - 1 && <span>,</span>}
                            </span>
                          ))}
                        </div>
                        {record.note && <div className="text-[9px] sm:text-xs opacity-80 mt-0.5 truncate w-full leading-none">{record.note}</div>}
                      </div>
                      /* 【【修改 5】縮減新增圖示區域的高度 (h-6 改為 h-5，sm:h-10 改為 sm:h-6) */
                    ))}
                    
                    <div onClick={(e) => { e.stopPropagation(); openAddModal(day, slot.id); }}
                         className={`w-full h-5 sm:h-6 border border-dashed border-gray-300 rounded bg-gray-50/50 text-gray-400 items-center justify-center hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300 transition-all cursor-pointer mt-auto
                               ${cellRecords.length > 0 ? 'flex opacity-100' : 'hidden sm:flex sm:opacity-0 sm:group-hover:opacity-100'}`}>
                      <Icons.Plus size={12} />
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

      const renderSettingsView = () => (
        <div className="flex-1 overflow-y-auto bg-gray-50 p-2 sm:p-4">
          <div className="max-w-4xl mx-auto bg-white rounded-lg sm:rounded-xl shadow-sm border overflow-hidden">
            <div className="flex border-b bg-gray-100 overflow-x-auto hide-scrollbar scroll-smooth">
              {['teachers', 'classes', 'slots', 'system'].map(tab => (
                <button key={tab} onClick={() => setSettingTab(tab)}
                        className={`flex-none w-1/4 min-w-[80px] sm:min-w-[100px] py-3 text-xs sm:text-sm font-bold text-center border-r last:border-0 transition-colors ${settingTab === tab ? 'bg-white text-blue-600 border-b-2 border-b-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>
                  {tab === 'teachers' ? '教師' : tab === 'classes' ? '班別' : tab === 'slots' ? '課節' : '維護'}
                </button>
              ))}
            </div>

            <div className="p-4 sm:p-6">
              {settingTab === 'teachers' && (
                <div>
                  <h3 className="text-base sm:text-lg font-bold mb-4">管理教師名單</h3>
                  <div className="flex flex-col sm:flex-row gap-2 mb-6 bg-gray-50 p-3 sm:p-4 rounded-lg border">
                    <input type="text" placeholder="全名 (例: 陳大文)" value={newTeacherName} onChange={e => setNewTeacherName(e.target.value)} className="flex-1 border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
                    <div className="flex gap-2">
                      <input type="text" placeholder="簡稱 (例: 陳)" value={newTeacherShort} onChange={e => setNewTeacherShort(e.target.value)} className="flex-1 sm:w-24 border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
                      <button onClick={() => { if(newTeacherName && newTeacherShort) { handleUpdateTeachers([...teachers, { id: Date.now(), name: newTeacherName, shortName: newTeacherShort }]); setNewTeacherName(''); setNewTeacherShort(''); } }} className="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 text-sm whitespace-nowrap">新增</button>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
                    {teachers.map(t => (
                      <div key={t.id} className="border p-3 rounded-lg flex justify-between items-center bg-white shadow-sm">
                        <div><div className="font-bold text-sm">{t.shortName}</div><div className="text-xs text-gray-500">{t.name}</div></div>
                        <button onClick={() => handleUpdateTeachers(teachers.filter(item => item.id !== t.id))} className="p-2 text-gray-400 hover:text-red-500 active:bg-gray-100 rounded-full"><Icons.Trash2 /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {settingTab === 'classes' && (
                <div>
                  <h3 className="text-base sm:text-lg font-bold mb-4">管理班別</h3>
                  <div className="flex gap-2 mb-6 bg-gray-50 p-3 sm:p-4 rounded-lg border max-w-sm">
                    <input type="text" placeholder="班別 (例: 1A)" value={newClass} onChange={e => setNewClass(e.target.value)} className="flex-1 border p-2 rounded outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
                    <button onClick={() => { if(newClass && !classes.includes(newClass)) { handleUpdateClasses([...classes, newClass]); setNewClass(''); } }} className="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 text-sm">新增</button>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {classes.map(c => (
                      <div key={c} className="border bg-white pl-4 pr-1 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm">
                        {c} <button onClick={() => handleUpdateClasses(classes.filter(item => item !== c))} className="p-1.5 text-gray-400 hover:text-red-500 rounded-full active:bg-gray-100"><Icons.X size={16} /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {settingTab === 'slots' && (
                <div>
                   <div className="flex justify-between items-center mb-4">
                     <h3 className="text-base sm:text-lg font-bold">課節列表管理</h3>
                     <button onClick={addSlot} className="flex items-center gap-1 border border-blue-600 text-blue-600 bg-blue-50 px-3 py-1.5 rounded hover:bg-blue-100 font-bold text-xs sm:text-sm">
                       <Icons.Plus /> 新增
                     </button>
                   </div>
                   <div className="space-y-3 pb-8">
                     {slots.map((slot, index) => (
                       <div key={slot.id} draggable onDragStart={(e) => handleDragStart(e, index)} onDragOver={(e) => {e.preventDefault();}} onDrop={(e) => handleDrop(e, index)} 
                            className={`flex flex-col sm:flex-row border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm hover:border-gray-300 transition-colors ${draggedIdx === index ? 'opacity-50' : ''}`}>
                         <div className="hidden sm:flex w-10 bg-gray-50 items-center justify-center cursor-move border-r border-gray-100 text-gray-400 hover:text-gray-600 hover:bg-gray-200">
                           <Icons.GripVertical />
                         </div>
                         <div className="flex-1 p-3 sm:p-4">
                           <div className="flex sm:hidden justify-between items-center mb-2 pb-2 border-b border-gray-100">
                             <div className="text-gray-400 cursor-move p-1"><Icons.GripVertical size={18}/></div>
                             <div className="flex items-center gap-2">
                               <label className="flex items-center gap-1.5 cursor-pointer bg-blue-50 px-2.5 py-1 rounded-full">
                                  <input type="checkbox" checked={slot.isOpen} onChange={(e) => updateSlot(slot.id, 'isOpen', e.target.checked)} className="w-3.5 h-3.5 accent-blue-600 cursor-pointer" />
                                  <span className="text-xs font-bold text-blue-800">開放</span>
                               </label>
                               <button onClick={() => removeSlot(slot.id)} className="p-1.5 text-gray-400 hover:text-red-600 bg-gray-50 rounded-full"><Icons.Trash2 size={16} /></button>
                             </div>
                           </div>

                           <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-3">
                             <input type="text" value={slot.name} onChange={(e) => updateSlot(slot.id, 'name', e.target.value)} placeholder="課節名稱" className="border p-2 rounded w-full sm:w-48 font-bold text-sm text-gray-700 outline-none focus:ring-2 focus:ring-blue-500" />
                             <input type="text" value={slot.time} onChange={(e) => updateSlot(slot.id, 'time', e.target.value)} placeholder="時間" className="border p-2 rounded w-full sm:w-40 text-sm text-gray-600 outline-none focus:ring-2 focus:ring-blue-500" />
                             
                             <div className="hidden sm:flex items-center gap-4 ml-auto">
                               <label className="flex items-center gap-2 cursor-pointer bg-blue-50 px-3 py-1.5 rounded-full">
                                  <input type="checkbox" checked={slot.isOpen} onChange={(e) => updateSlot(slot.id, 'isOpen', e.target.checked)} className="w-4 h-4 accent-blue-600 cursor-pointer" />
                                  <span className="text-sm font-bold text-blue-800">開放填寫</span>
                               </label>
                               <button onClick={() => removeSlot(slot.id)} className="p-2 text-gray-400 hover:text-red-600 bg-gray-50 rounded-full hover:bg-red-50"><Icons.Trash2 size={18} /></button>
                             </div>
                           </div>
                           
                           <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 text-sm sm:pl-0">
                             <span className="text-xs sm:text-sm text-gray-500 font-medium">適用日子：</span>
                             <div className="flex flex-wrap gap-x-4 gap-y-2">
                               {[1,2,3,4,5].map(d => (
                                 <label key={d} className="flex items-center gap-1.5 cursor-pointer">
                                   <input type="checkbox" checked={slot.days.includes(d)} onChange={(e) => {
                                       const newDays = e.target.checked ? [...slot.days, d].sort() : slot.days.filter(day => day !== d);
                                       updateSlot(slot.id, 'days', newDays);
                                     }} className="w-4 h-4 accent-blue-600 cursor-pointer" />
                                   <span className="text-xs sm:text-sm text-gray-700">星{['一','二','三','四','五'][d-1]}</span>
                                 </label>
                               ))}
                             </div>
                           </div>
                         </div>
                       </div>
                     ))}
                   </div>
                </div>
              )}

              {settingTab === 'system' && (
                <div>
                  <h3 className="text-base sm:text-lg font-bold mb-4 flex items-center gap-2 text-red-700">
                    <Icons.AlertTriangle size={20} /> 空間清理
                  </h3>
                  <div className="bg-red-50 border border-red-200 p-4 sm:p-6 rounded-xl shadow-sm">
                    <p className="text-xs sm:text-sm text-gray-700 mb-4 sm:mb-6 leading-relaxed">
                      刪除舊記錄可以讓系統在手機上跑得更順暢。<br/><span className="font-bold text-red-600">注意：刪除後無法復原。</span>
                    </p>
                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 bg-white p-3 sm:p-4 rounded-lg border border-red-100">
                      <label className="text-xs sm:text-sm font-bold text-gray-700 shrink-0">永久刪除此日期之前的記錄：</label>
                      <input type="date" value={cleanupDate} onChange={(e) => setCleanupDate(e.target.value)} className="border p-2 rounded outline-none focus:ring-2 focus:ring-red-400 bg-gray-50 w-full sm:w-auto text-sm"/>
                      <button onClick={handleCleanupRecords} className="bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700 text-sm w-full sm:w-auto flex justify-center items-center gap-2"><Icons.Trash2 size={16} /> 執行清理</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col h-screen w-full bg-gray-100 font-sans overflow-hidden">
          {renderHeader()}
          {activeTab === 'calendar' ? renderCalendarView() : renderSettingsView()}
          
          {showPwdModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                <div className="bg-[#1e2336] text-white p-3 sm:p-4 flex items-center gap-2">
                  <Icons.Lock size={18} /><h3 className="font-bold text-base sm:text-lg">安全驗證</h3>
                  <button onClick={() => setShowPwdModal(false)} className="ml-auto hover:bg-slate-700 p-1.5 rounded"><Icons.X size={18}/></button>
                </div>
                <form onSubmit={verifyPassword} className="p-5 sm:p-6">
                  <input type="password" value={pwdInput} onChange={(e) => { setPwdInput(e.target.value); setPwdError(''); }} placeholder="請輸入設定密碼" className={`w-full border p-3 rounded-lg text-center tracking-widest text-lg outline-none focus:ring-2 ${pwdError ? 'border-red-500 focus:ring-red-200' : 'focus:ring-blue-500'}`}/>
                  {pwdError && <p className="text-red-500 text-xs font-bold mt-2 text-center">{pwdError}</p>}
                  <div className="mt-5 flex gap-3">
                    <button type="button" onClick={() => setShowPwdModal(false)} className="flex-1 py-2 border rounded-lg text-gray-700 font-bold hover:bg-gray-50 text-sm">取消</button>
                    <button type="submit" className="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 text-sm">確認</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {isModalOpen && (
            <RecordModalForm 
              editingRecord={editingRecord} selectedSlotInfo={selectedSlotInfo} teachers={teachers} classes={classes} Icons={Icons}
              onClose={() => setIsModalOpen(false)} onSave={saveRecord} onDelete={deleteRecord}
            />
          )}
        </div>
      );
    }

    // --- Modal Component ---
    function RecordModalForm({ editingRecord, selectedSlotInfo, teachers, classes, Icons, onClose, onSave, onDelete }) {
      
      // 修復：初始化時，強制作出最少兩個填寫欄位 (原任 / 代課)
      const getInitialEntries = () => {
        if (editingRecord && editingRecord.entries.length > 0) {
          const arr = [...editingRecord.entries];
          // 如果編輯舊資料只有一筆，自動補第二筆空欄位方便填寫代課
          while(arr.length < 2) arr.push({ teacher: '', class: '', customTeacher: '', customClass: '' });
          return arr;
        }
        return [
          { teacher: '', class: '', customTeacher: '', customClass: '' },
          { teacher: '', class: '', customTeacher: '', customClass: '' }
        ];
      };

      const [entries, setEntries] = useState(getInitialEntries());
      const [note, setNote] = useState(editingRecord ? editingRecord.note : '');
      const [errorMsg, setErrorMsg] = useState('');
      const [isConfirmingDelete, setIsConfirmingDelete] = useState(false);

      const handleEntryChange = (index, field, value) => {
        const newEntries = [...entries]; newEntries[index][field] = value; setEntries(newEntries);
      };
      const addEntry = () => setEntries([...entries, { teacher: '', class: '', customTeacher: '', customClass: '' }]);

      const handleSubmit = (e) => {
        e.preventDefault(); setErrorMsg('');
        const processedEntries = entries.map(entry => ({
          teacher: entry.teacher === '其他' ? entry.customTeacher : entry.teacher,
          class: entry.class === '其他' ? entry.customClass : entry.class
        })).filter(entry => entry.teacher && entry.class);
        
        if (processedEntries.length === 0) { setErrorMsg('請至少完整填寫原任老師及班別！'); return; }
        onSave({ entries: processedEntries, note });
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100] p-0 sm:p-4 backdrop-blur-sm">
          <div className="bg-white sm:rounded-xl rounded-t-2xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh] sm:max-h-full animate-[slideUp_0.2s_ease-out]">
            <div className="bg-blue-600 text-white p-3 sm:p-4 flex justify-between items-center shrink-0 rounded-t-2xl sm:rounded-t-xl">
              <h3 className="font-bold text-base sm:text-lg">{editingRecord ? '編輯調堂記錄' : '新增調堂記錄'}</h3>
              <button onClick={onClose} className="hover:bg-blue-700 p-1.5 rounded"><Icons.X size={20}/></button>
            </div>
            
            <form onSubmit={handleSubmit} className="p-4 sm:p-5 overflow-y-auto flex-1">
              <div className="mb-4 text-xs sm:text-sm text-blue-800 font-bold bg-blue-50 p-2.5 rounded-lg border border-blue-100 flex items-center">
                <Icons.Calendar className="mr-2" size={16} /> {editingRecord ? editingRecord.date : selectedSlotInfo?.date}
              </div>

              {entries.map((entry, index) => (
                <div key={index} className="mb-3 p-3 sm:p-4 border rounded-xl bg-gray-50/50 relative border-gray-200">
                  <h4 className="text-xs sm:text-sm font-bold text-gray-700 mb-2.5 flex items-center">
                    <span className={`text-white rounded-full w-4 h-4 sm:w-5 sm:h-5 flex items-center justify-center text-[10px] sm:text-xs mr-2 ${index === 0 ? 'bg-blue-500' : 'bg-emerald-500'}`}>
                      {index + 1}
                    </span>
                    {/* 修復：加上清楚的標示文字 */}
                    {index === 0 ? '教師1' : index === 1 ? '教師2' : `教師 ${index + 1}`}
                    {index === 0 && <span className="text-red-500 ml-1">*</span>}
                  </h4>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[10px] sm:text-xs font-bold text-gray-500 mb-1">教師</label>
                      <select value={entry.teacher} onChange={(e) => handleEntryChange(index, 'teacher', e.target.value)} className="w-full border p-2 rounded-lg text-xs sm:text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">請選擇</option>
                        {teachers.map(t => <option key={t.id} value={t.shortName}>{t.name}</option>)}
                        <option value="其他">其他...</option>
                      </select>
                      {entry.teacher === '其他' && <input type="text" placeholder="自行填寫" value={entry.customTeacher} onChange={(e) => handleEntryChange(index, 'customTeacher', e.target.value)} className="w-full border p-2 rounded-lg text-xs mt-1.5 outline-none focus:ring-2 focus:ring-blue-500"/>}
                    </div>
                    <div>
                      <label className="block text-[10px] sm:text-xs font-bold text-gray-500 mb-1">班別</label>
                      <select value={entry.class} onChange={(e) => handleEntryChange(index, 'class', e.target.value)} className="w-full border p-2 rounded-lg text-xs sm:text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">請選擇</option>
                        {classes.map(c => <option key={c} value={c}>{c}</option>)}
                        <option value="其他">其他...</option>
                      </select>
                      {entry.class === '其他' && <input type="text" placeholder="自行填寫" value={entry.customClass} onChange={(e) => handleEntryChange(index, 'customClass', e.target.value)} className="w-full border p-2 rounded-lg text-xs mt-1.5 outline-none focus:ring-2 focus:ring-blue-500"/>}
                    </div>
                  </div>
                </div>
              ))}

              <button type="button" onClick={addEntry} className="w-full py-2.5 border-2 border-dashed border-blue-200 text-blue-600 rounded-xl text-xs sm:text-sm font-bold hover:bg-blue-50 mb-4 flex items-center justify-center transition-colors">
                <Icons.Plus className="mr-1" /> 加入教師
              </button>

              <div className="mb-4">
                <label className="block text-xs sm:text-sm font-bold text-gray-700 mb-1.5">備註 (選填)</label>
                <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="如：代課、開會..." className="w-full border p-2 sm:p-2.5 rounded-lg text-xs sm:text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
              </div>

              {errorMsg && <div className="text-red-500 text-xs sm:text-sm font-bold mb-3 bg-red-50 p-2 rounded">{errorMsg}</div>}

              <div className="flex justify-end gap-2 sm:gap-3 pt-3 sm:pt-4 border-t mt-auto">
                {editingRecord && (
                  isConfirmingDelete ? (
                    <div className="flex items-center gap-1.5 mr-auto bg-red-50 p-1 rounded-lg border border-red-100">
                      <span className="text-[10px] sm:text-xs text-red-600 font-bold px-1">確定？</span>
                      <button type="button" onClick={() => onDelete(editingRecord.id)} className="px-2.5 py-1 bg-red-600 text-white rounded text-[10px] sm:text-xs font-bold">是</button>
                      <button type="button" onClick={() => setIsConfirmingDelete(false)} className="px-2.5 py-1 bg-gray-200 text-gray-700 rounded text-[10px] sm:text-xs font-bold">否</button>
                    </div>
                  ) : (
                    <button type="button" onClick={() => setIsConfirmingDelete(true)} className="px-3 py-1.5 sm:px-4 sm:py-2 bg-red-50 text-red-600 rounded-lg text-xs sm:text-sm font-bold mr-auto flex items-center">
                      <Icons.Trash2 className="mr-1" size={14}/> 刪除
                    </button>
                  )
                )}
                <button type="button" onClick={onClose} className="px-4 py-2 border rounded-lg text-xs sm:text-sm font-bold text-gray-600 bg-white">取消</button>
                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg text-xs sm:text-sm font-bold shadow-md">儲存</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
